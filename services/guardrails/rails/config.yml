models:
  - type: main
    engine: openai
    model: gpt-4.1-nano

rails:
  input:
    flows:
      - validate property submission
      - validate property off topic
      - validate property offensive
      - validate report content
      - validate report for data
      - validate report for advice

instructions:
  - type: general
    content: |
      You are a validation assistant for a real estate property submission system.
      Your job is to determine whether incoming text is a genuine property listing
      and whether outgoing reports are factual and free of false claims.
